    <style>
      :root {
        --bg: #0f1425;
        --panel: rgba(20, 29, 52, 0.88);
        --panel-border: rgba(255, 212, 132, 0.18);
        --text: #f8f0dc;
        --muted: #cbbd9b;
        --accent: #ffcb67;
        --accent-strong: #f29a2e;
        --focus: #8ed8ff;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(88, 122, 212, 0.2), transparent 36%),
          linear-gradient(180deg, #1b2139 0%, #0f1425 45%, #090d18 100%);
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      .hero {
        margin-bottom: 2rem;
      }

      .eyebrow {
        margin: 0 0 0.6rem;
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-size: clamp(2.5rem, 5vw, 4.4rem);
        line-height: 0.95;
      }

      .intro {
        max-width: 62ch;
        margin: 1rem 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .status {
        margin: 1.25rem 0 0;
        min-height: 1.5rem;
        color: var(--accent);
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 1.2rem;
      }

      .card {
        display: grid;
        grid-template-rows: auto 1fr;
        background: linear-gradient(180deg, rgba(30, 42, 76, 0.96), rgba(11, 17, 33, 0.96));
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        overflow: hidden;
      }

      .card:focus-within {
        outline: 3px solid var(--focus);
        outline-offset: 4px;
      }

      .art {
        background: rgba(255, 255, 255, 0.05);
      }

      .art img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .art-placeholder {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .content {
        display: grid;
        gap: 0.9rem;
        padding: 1rem;
      }

      .card-link {
        display: grid;
        color: inherit;
        text-decoration: none;
      }

      .card-link[aria-disabled="true"] {
        cursor: default;
      }

      .meta {
        display: grid;
        gap: 0.35rem;
      }

      .set {
        color: var(--accent);
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-size: 1.25rem;
        line-height: 1.15;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin-top: auto;
      }

      .card-link:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        font: inherit;
      }

      .button {
        flex: 1 1 auto;
        cursor: pointer;
        color: #1b1730;
        background: linear-gradient(180deg, #ffd772 0%, #f0a43b 100%);
      }

      .button[data-state="playing"] {
        background: linear-gradient(180deg, #9ad9ff 0%, #5bb6ff 100%);
      }

      .button:hover,
      .card-link:hover .title {
        color: var(--accent);
      }

      .card-link:hover .art img {
        transform: translateY(-1px);
      }

      .button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

    </style>
  </head>

      const grid = document.getElementById("grid");
      const status = document.getElementById("status");
      const summary = document.getElementById("summary");

      const totalClips = cards.reduce((sum, card) => sum + card.audios.length, 0);
      summary.textContent = `Catalog: ${cards.length} cards, ${totalClips} audio clips from local soundpack files.`;

      let currentAudio = null;
      let currentButton = null;

      function setButtonState(button, state) {
        button.dataset.state = state;
        button.setAttribute("aria-pressed", state === "playing" ? "true" : "false");
        button.textContent = state === "playing" ? "Pause" : button.dataset.label;
      }

      function resetCurrent() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
        }

        if (currentButton) {
          setButtonState(currentButton, "idle");
        }

        currentAudio = null;
        currentButton = null;
      }

      function playCard(card, clip, button) {
        if (currentButton === button && currentAudio && !currentAudio.paused) {
          resetCurrent();
          status.textContent = `Paused: ${card.title} (${clip.label})`;
          return;
        }

        resetCurrent();

        const audio = new Audio(encodeURI(clip.path));
        currentAudio = audio;
        currentButton = button;
        setButtonState(button, "playing");
        status.textContent = `Playing: ${card.title} (${clip.label})`;

        audio.addEventListener("ended", () => {
          if (currentButton === button) {
            resetCurrent();
            status.textContent = `Finished: ${card.title} (${clip.label})`;
          }
        });

        audio.addEventListener("error", () => {
          if (currentButton === button) {
            resetCurrent();
            status.textContent = `Could not load audio: ${card.title} (${clip.label})`;
          }
        });

        audio.play().catch(() => {
          resetCurrent();
          status.textContent = `Playback was blocked for: ${card.title} (${clip.label})`;
        });
      }

      function renderCard(card) {
        const tile = document.createElement("article");
        tile.className = "card";

        const hasSource = typeof card.source === "string" && card.source.length > 0;
        const hasImage = typeof card.image === "string" && card.image.length > 0;

        const link = document.createElement("a");
        link.className = "card-link";
        link.href = hasSource ? card.source : "#";
        if (!hasSource) {
          link.setAttribute("aria-disabled", "true");
          link.addEventListener("click", (event) => event.preventDefault());
        }

        const art = document.createElement("div");
        art.className = "art";
        if (hasImage) {
          const img = document.createElement("img");
          img.src = card.image;
          img.alt = card.title;
          img.loading = "lazy";
          art.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "art-placeholder";
          ph.textContent = "No image";
          art.appendChild(ph);
        }

        const meta = document.createElement("div");
        meta.className = "meta";
        const set = document.createElement("div");
        set.className = "set";
        set.textContent = card.set;
        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = card.title;
        meta.append(set, title);

        link.append(art, meta);

        const content = document.createElement("div");
        content.className = "content";
        content.appendChild(link);

        const actions = document.createElement("div");
        actions.className = "actions";
        card.audios.forEach((clip) => {
          const button = document.createElement("button");
          button.className = "button";
          button.type = "button";
          button.dataset.state = "idle";
          button.dataset.label = clip.label;
          button.setAttribute("aria-pressed", "false");
          button.textContent = clip.label;
          button.addEventListener("click", () => playCard(card, clip, button));
          actions.append(button);
        });

        content.appendChild(actions);
        tile.appendChild(content);

        return tile;
      }

      cards.forEach((card) => {
        grid.appendChild(renderCard(card));
      });
